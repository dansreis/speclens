schema: spec-driven-with-adr

context: |
  AdMedia is a retail media network platform.
  Retailers monetise their owned digital surfaces (e-commerce site, app,
  in-store screens) by selling sponsored placements to brands.
  Brands run campaigns against retailer audiences and first-party purchase data.

  Tech stack:
    - Service layer: TypeScript (Node 20) + Fastify, deployed on AWS EKS
    - Bid engine: Rust, in-cluster, sub-100ms p99 SLA
    - Storage: Postgres (catalog), ScyllaDB (bid-state cache), ClickHouse (analytics)
    - Event bus: Kafka (impressions, clicks, conversions)
    - Edge: CloudFront + Lambda@Edge for ad-decisioning at retailer surfaces

rules:
  proposal:
    - State the "why" before the "what".
    - Capabilities section MUST list new vs modified capabilities explicitly.
  design:
    - Document trade-offs against at least one rejected alternative.
    - Reference in-force ADRs by their NNNN id when a decision depends on them.
  specs:
    - Every requirement MUST have at least one scenario.
    - Use SHALL / MUST for normative behaviour; reserve SHOULD for recommendations.
  tasks:
    - Each task MUST be a checkbox `- [ ] N.M Description`.
    - Group tasks under numbered `## N. Section` headings.
