name: Release

# Builds and publishes a GitHub release when the version in package.json
# changes on main (i.e. when a release PR created by `pnpm create-release`
# is merged). Bundles are built per-platform (macOS, Linux, Windows) and
# attached to the release together. See RELEASE.md for the full flow.
on:
  push:
    branches: [main]
    paths:
      - "package.json"
  # Manual escape hatch: re-release the current version, e.g. after fixing a
  # broken build leg without bumping the version again.
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2 # need the previous commit to compare against

      - name: Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREVIOUS_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
            echo "Previous version: $PREVIOUS_VERSION"

            if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
              echo "version_changed=true" >> $GITHUB_OUTPUT
              echo "✅ Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
            else
              echo "version_changed=false" >> $GITHUB_OUTPUT
              echo "ℹ️ Version unchanged: $CURRENT_VERSION"
            fi
          else
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "✅ First commit, version: $CURRENT_VERSION"
          fi

      - name: Verify version files are in sync
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$VERSION" != "$TAURI_VERSION" ]; then
            echo "❌ package.json ($VERSION) and tauri.conf.json ($TAURI_VERSION) disagree."
            echo "Run 'pnpm create-release' instead of editing versions by hand."
            exit 1
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Runners are pinned (not *-latest) so runner-image migrations don't
          # change the build environment underneath us. Bump deliberately.
          # macos-15 is arm64 → aarch64-apple-darwin.
          - platform: macos-arm64
            os: macos-15
            bundles: |
              src-tauri/target/release/bundle/dmg/*.dmg
          # ubuntu-22.04 (not 24.04): AppImages link against the build host's
          # glibc, so building on the older LTS keeps them runnable on more
          # distros.
          - platform: linux-x86_64
            os: ubuntu-22.04
            bundles: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - platform: linux-arm64
            os: ubuntu-22.04-arm
            bundles: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - platform: windows-x86_64
            os: windows-2022
            bundles: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          # WiX (msi) doesn't support arm64; NSIS does, so bundle only that.
          - platform: windows-arm64
            os: windows-11-arm
            args: --bundles nsis
            bundles: |
              src-tauri/target/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux system dependencies
        if: contains(matrix.platform, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdg-utils

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Exports the Apple signing/notarization env vars only when the secrets
      # are configured: Tauri signs + notarizes when they're present and would
      # choke on set-but-empty values. Falls back to an unsigned build with a
      # warning so releases don't hard-depend on the certificate setup.
      - name: Enable macOS code signing
        if: matrix.platform == 'macos-arm64'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            for var in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
              {
                echo "$var<<APPLE_SECRET_EOF"
                printenv "$var"
                echo "APPLE_SECRET_EOF"
              } >> "$GITHUB_ENV"
            done
            echo "✅ Code signing enabled"
            if [ -z "$APPLE_ID" ]; then
              echo "::warning::APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID missing - app will be signed but NOT notarized"
            fi
          else
            echo "::warning::Apple signing secrets not configured - building unsigned dmg"
          fi

      # llama.cpp can't build with MSVC on ARM, and the ClangCL toolset
      # conflicts with the cmake crate's hardcoded -Thost=x64. Ship this leg
      # without the embedded engine for now - AI via a local Ollama server
      # still works (pure HTTP, feature-independent). See docs/ROADMAP.md.
      - name: Disable embedded llama.cpp (Windows ARM)
        if: matrix.platform == 'windows-arm64'
        shell: bash
        run: sed -i 's/^default = \["local-llm"\]/default = []/' src-tauri/Cargo.toml

      - name: Build app
        run: pnpm tauri build ${{ matrix.args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v7
        with:
          name: bundles-${{ matrix.platform }}
          path: ${{ matrix.bundles }}
          if-no-files-found: error

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Download all bundles
        uses: actions/download-artifact@v8
        with:
          pattern: bundles-*
          path: dist
          merge-multiple: true

      - name: List bundles
        run: ls -laR dist

      - name: Extract changelog for this version
        run: |
          if [ -f CHANGELOG.md ]; then
            # Section between this version's header and the next "## [" header
            sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '1d;$d' > /tmp/changelog.txt
            # Last (or only) section has no trailing header to stop at
            if [ ! -s /tmp/changelog.txt ]; then
              sed -n "/^## \[$VERSION\]/,\$p" CHANGELOG.md | tail -n +2 > /tmp/changelog.txt
            fi
          fi
          if [ ! -s /tmp/changelog.txt ]; then
            echo "Release $VERSION" > /tmp/changelog.txt
          fi
          cat /tmp/changelog.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ env.VERSION }}
          name: SpecLens v${{ env.VERSION }}
          body_path: /tmp/changelog.txt
          # ** because multi-glob artifacts (linux, windows-x64) arrive with
          # their bundle subdirectory structure (dist/msi/*.msi etc.) intact.
          files: dist/**
          draft: false
          prerelease: false

  # Redeploys the website so anything derived from the release (downloads
  # grid, recommended build) is served fresh rather than from a stale deploy.
  deploy-website:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger the Deploy website workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --repo "$GITHUB_REPOSITORY"

  # Bumps version + sha256 in dansreis/homebrew-tap's speclens cask. Needs the
  # TAP_TOKEN secret (fine-grained PAT with contents:write on homebrew-tap);
  # skips with a warning when it's absent so releases don't depend on it.
  update-tap:
    needs: [check-version, release]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - name: Bump Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::warning::TAP_TOKEN not set - skipping Homebrew cask bump"
            exit 0
          fi
          gh release download "v$VERSION" --repo "$GITHUB_REPOSITORY" \
            --pattern "*aarch64.dmg" --output app.dmg
          SHA256=$(sha256sum app.dmg | cut -d' ' -f1)
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/dansreis/homebrew-tap.git" tap
          cd tap
          sed -i "s/^  version \".*\"$/  version \"$VERSION\"/" Casks/speclens.rb
          sed -i "s/^  sha256 \".*\"$/  sha256 \"$SHA256\"/" Casks/speclens.rb
          if git diff --quiet; then
            echo "Cask already up to date"
            exit 0
          fi
          git config user.name "Daniel Reis"
          git config user.email "danielreis3195@gmail.com"
          git commit -am "speclens $VERSION"
          git push
